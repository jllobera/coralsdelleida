---
layout: default
title: "Choir Directory"
permalink: /choir-directory/
---

<h1>Choir Directory</h1>
<div class="choir-list">
  {% for choir in site.choirs %}
  <div class="choir-card">
    <img src="{{ choir.img }}" alt="{{ choir.name }}">
    <h3>{{ choir.name }}</h3>
    <p>Type: {{ choir.type }}</p>
    <p>Location: {{ choir.location }}</p>
    <p>Year Established: {{ choir.year }}</p>
    <a href="{{ choir.website }}" target="_blank">Visit Website</a>
  </div>
  {% endfor %}
</div>
